# AI Content Moderation Eval Framework — Evaluation Configuration
#
# All retry/rate-limit settings here are read by the CLI runner (scripts/run_eval.py)
# and passed through to provider constructors. They are NOT decorative.

evaluation:
  max_concurrent: 5
  rubric: "rubrics/default.yaml"
  retry:
    max_retries: 3
    backoff_base: 2.0
  output_dir: "outputs"
  log_level: "INFO"

providers:
  openai:
    enabled: true
    model: "omni-moderation-latest"
    rate_limit_rpm: 60
    # API key read from OPENAI_API_KEY env var

  perspective:
    enabled: true
    rate_limit_rpm: 60
    attributes:
      - TOXICITY
      - SEVERE_TOXICITY
      - IDENTITY_ATTACK
      - INSULT
      - PROFANITY
      - THREAT
    # API key read from PERSPECTIVE_API_KEY env var

  llm_judge_claude:
    enabled: true
    backend: "anthropic"
    model: "claude-sonnet-4-20250514"
    rate_limit_rpm: 30
    # API key read from ANTHROPIC_API_KEY env var

  llm_judge_gpt4o:
    enabled: false
    backend: "openai"
    model: "gpt-4o"
    rate_limit_rpm: 30
    # API key read from OPENAI_API_KEY env var
